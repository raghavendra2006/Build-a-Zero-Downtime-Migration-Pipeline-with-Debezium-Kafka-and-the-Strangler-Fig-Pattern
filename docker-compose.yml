# =============================================================================
# Zero-Downtime Migration Pipeline
# Strangler Fig Pattern + CDC with Debezium, Kafka, and PostgreSQL
#
# Usage: docker compose up --build -d
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # 1. Legacy PostgreSQL Database
  # ---------------------------------------------------------------------------
  legacy_db:
    image: postgres:14
    container_name: legacy_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-postgres}
    command: postgres -c wal_level=logical -c max_replication_slots=4 -c max_wal_senders=4
    volumes:
      - legacy_db_data:/var/lib/postgresql/data
      - ./legacy_service/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - migration_net

  # ---------------------------------------------------------------------------
  # 2. Micro PostgreSQL Database
  # ---------------------------------------------------------------------------
  micro_db:
    image: postgres:14
    container_name: micro_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-postgres}
    volumes:
      - micro_db_data:/var/lib/postgresql/data
      - ./micro_service/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    ports:
      - "5434:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - migration_net

  # ---------------------------------------------------------------------------
  # 3. Kafka (KRaft mode — no ZooKeeper)
  # ---------------------------------------------------------------------------
  kafka:
    image: apache/kafka:3.7.0
    container_name: kafka
    restart: unless-stopped
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      CLUSTER_ID: "MkU3OEVBNTcwNTJENDM2Qk"
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092 || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 15
      start_period: 30s
    networks:
      - migration_net

  # ---------------------------------------------------------------------------
  # 4. Debezium (Kafka Connect with PostgreSQL connector)
  # ---------------------------------------------------------------------------
  debezium:
    image: debezium/connect:2.5
    container_name: debezium
    restart: unless-stopped
    environment:
      BOOTSTRAP_SERVERS: kafka:9092
      GROUP_ID: debezium-connect
      CONFIG_STORAGE_TOPIC: _connect_configs
      OFFSET_STORAGE_TOPIC: _connect_offsets
      STATUS_STORAGE_TOPIC: _connect_statuses
      CONFIG_STORAGE_REPLICATION_FACTOR: 1
      OFFSET_STORAGE_REPLICATION_FACTOR: 1
      STATUS_STORAGE_REPLICATION_FACTOR: 1
      KEY_CONVERTER: org.apache.kafka.connect.json.JsonConverter
      VALUE_CONVERTER: org.apache.kafka.connect.json.JsonConverter
      KEY_CONVERTER_SCHEMAS_ENABLE: "false"
      VALUE_CONVERTER_SCHEMAS_ENABLE: "false"
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      DB_NAME: ${DB_NAME:-postgres}
    volumes:
      - ./debezium/register-connector.sh:/scripts/register-connector.sh:ro
      - ./debezium/entrypoint.sh:/scripts/entrypoint.sh:ro
    entrypoint: ["/bin/bash", "/scripts/entrypoint.sh"]
    depends_on:
      kafka:
        condition: service_healthy
      legacy_db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8083/ || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 20
      start_period: 45s
    networks:
      - migration_net

  # ---------------------------------------------------------------------------
  # 5. Legacy Service
  # ---------------------------------------------------------------------------
  legacy_service:
    build:
      context: ./legacy_service
      dockerfile: Dockerfile
    container_name: legacy_service
    restart: unless-stopped
    environment:
      DB_HOST: legacy_db
      DB_PORT: 5432
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      DB_NAME: ${DB_NAME:-postgres}
    ports:
      - "8081:8081"
    depends_on:
      legacy_db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8081/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s
    stop_grace_period: 10s
    networks:
      - migration_net

  # ---------------------------------------------------------------------------
  # 6. Micro Service
  # ---------------------------------------------------------------------------
  micro_service:
    build:
      context: ./micro_service
      dockerfile: Dockerfile
    container_name: micro_service
    restart: unless-stopped
    environment:
      DB_HOST: micro_db
      DB_PORT: 5432
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      DB_NAME: ${DB_NAME:-postgres}
    ports:
      - "8082:8082"
    depends_on:
      micro_db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8082/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s
    stop_grace_period: 10s
    networks:
      - migration_net

  # ---------------------------------------------------------------------------
  # 7. CDC Consumer
  # ---------------------------------------------------------------------------
  cdc_consumer:
    build:
      context: ./cdc_consumer
      dockerfile: Dockerfile
    container_name: cdc_consumer
    restart: unless-stopped
    environment:
      KAFKA_BROKER: kafka:9092
      KAFKA_TOPIC: legacyserver.public.orders
      KAFKA_GROUP_ID: cdc-consumer-group
      OUTPUT_FILE: /output/cdc_events.jsonl
      LEGACY_DB_HOST: legacy_db
      LEGACY_DB_PORT: 5432
      LEGACY_DB_USER: ${DB_USER:-postgres}
      LEGACY_DB_PASSWORD: ${DB_PASSWORD:-postgres}
      LEGACY_DB_NAME: ${DB_NAME:-postgres}
    volumes:
      - ./output:/output
    ports:
      - "8083:8083"
    depends_on:
      kafka:
        condition: service_healthy
      legacy_db:
        condition: service_healthy
      debezium:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8083/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    stop_grace_period: 15s
    networks:
      - migration_net

  # ---------------------------------------------------------------------------
  # 8. Gateway
  # ---------------------------------------------------------------------------
  gateway:
    build:
      context: ./gateway
      dockerfile: Dockerfile
    container_name: gateway
    restart: unless-stopped
    environment:
      LEGACY_SERVICE_URL: http://legacy_service:8081
      MICRO_SERVICE_URL: http://micro_service:8082
      METRICS_OUTPUT_FILE: /output/metrics_snapshot.json
      ROLLBACK_LOG_FILE: /output/rollback_log.jsonl
      DUAL_WRITE_TIMEOUT_MS: 500
      LATENCY_WINDOW_SIZE: 1000
      HTTP_TIMEOUT_S: 5.0
    volumes:
      - ./output:/output
    ports:
      - "8080:8080"
    depends_on:
      legacy_service:
        condition: service_healthy
      micro_service:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s
    stop_grace_period: 10s
    networks:
      - migration_net

# =============================================================================
# Volumes
# =============================================================================
volumes:
  legacy_db_data:
  micro_db_data:

# =============================================================================
# Networks
# =============================================================================
networks:
  migration_net:
    driver: bridge
